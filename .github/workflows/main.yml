name: JDE Health Sync & WASM Data Build

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Consolidate Data
        env:
          LIST_PAR: "https://objectstorage.us-ashburn-1.oraclecloud.com/p/2xxxx/b/JDE_Monitoring_Data/o/"
        run: |
          mkdir -p data_folder
          
          # 1. Get the list of objects from OCI
          echo "Fetching object list..."
          OBJECT_JSON=$(curl -s -f GET "$LIST_PAR")
          
          # 2. Extract ONLY valid health.json filenames
          # This prevents picking up targets.txt or other random bucket files
          FILENAMES=$(echo "$OBJECT_JSON" | jq -r '.objects[]?.name | select(. != null and endswith("_health.json"))')
          
          for FILE in $FILENAMES; do
            if [ ! -f "data_folder/${FILE}" ]; then
                echo "Downloading $FILE..."
                # --fail ensures that if the file is missing (404), curl exits 0 without creating a file
                curl -sL --fail "${LIST_PAR}${FILE}" -o "data_folder/${FILE}" || echo "Notice: Could not download $FILE, skipping."
            fi
          done

          # 3. Cleanup files older than 15 days
          find data_folder -name "*.json" -type f -mtime +15 -delete

          # 4. Build consolidated dashboard_data.json
          echo "Building dashboard_data.json..."
          # Group by Customer_Host_Group and take the latest timestamp
          LATEST_FILES=$(ls data_folder/*_health.json | xargs -n 1 basename | sort -r | awk -F_ '!visited[$1$2$3]++')
          
          echo "[" > dashboard_data.json
          FIRST=true
          for F in $LATEST_FILES; do
            if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> dashboard_data.json; fi
            cat "data_folder/$F" | jq -c '.[]' >> dashboard_data.json
          done
          echo "]" >> dashboard_data.json

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data_folder/ dashboard_data.json
          git commit -m "Sync & Build Data: $(date)" || echo "No changes to commit"
          git push