name: JDE Health Sync & WASM Data Build

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync-health:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4 to fix that Node.js 20 warning
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Consolidate Data
        run: |
          mkdir -p data_folder
          
          # We use single quotes around the URL to prevent shell expansion issues
          LIST_URL='https://objectstorage.us-ashburn-1.oraclecloud.com/p/2iZ2CfFNkV8LVuzg3LHTaqjseLntrFEtA991Jg9gUUDQjqjP6sSQUqyItWJh15ya/n/id7bn4roxxyb/b/JDE_Monitoring_Data/o/'
          
          echo "Fetching object list..."
          # Added -L to follow redirects and -sS to show errors if it fails
          OBJECT_JSON=$(curl -f -sSL "$LIST_URL")
          
          # Extract health files
          FILENAMES=$(echo "$OBJECT_JSON" | jq -r '.objects[]?.name | select(test("^[a-zA-Z0-9]+_.*_health\\.json$"))')
          
          if [ -z "$FILENAMES" ]; then
            echo "No matching health files found in bucket."
          else
            for FILE in $FILENAMES; do
              if [ ! -f "data_folder/${FILE}" ]; then
                  echo "Downloading $FILE..."
                  curl -sL --fail "${LIST_URL}${FILE}" -o "data_folder/${FILE}" || echo "Skipped $FILE"
              fi
            done
          fi

          # Cleanup and Build dashboard_data.json
          find data_folder -name "*_health.json" -type f -mtime +15 -delete
          
          echo "Building dashboard_data.json..."
          # Grouping logic to get latest files
          LATEST_FILES=$(ls data_folder/*_health.json 2>/dev/null | xargs -n 1 basename 2>/dev/null | sort -r | awk -F_ '!visited[$1$2$3]++') || true
          
          echo "[" > dashboard_data.json
          FIRST=true
          for F in $LATEST_FILES; do
            if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> dashboard_data.json; fi
            cat "data_folder/$F" | jq -c '.[]' >> dashboard_data.json
          done
          echo "]" >> dashboard_data.json

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data_folder/ dashboard_data.json
          # Only commit if there are actually changes to avoid dummy errors
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync & Build: $(date)"
            git push
          fi