name: JDE Health Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Merge Data
        run: |
          mkdir -p data_folder
          mkdir -p docs
          
          # 1. List and Download files from OCI
          LIST_URL="https://objectstorage.us-ashburn-1.oraclecloud.com/p/2iZ2CfFNkV8LVuzg3LHTaqjseLntrFEtA991Jg9gUUDQjqjP6sSQUqyItWJh15ya/n/id7bn4roxxyb/b/JDE_Monitoring_Data/o/"
          FILES=$(curl -s "$LIST_URL" | jq -r '.objects[].name | select(contains("_health.json"))')

          for F in $FILES; do
            curl -s "${LIST_URL}${F}" -o "data_folder/$F"
          done

          # 2. Consolidate into ONE valid JSON array
          # This prevents the "expected , or ]" syntax error in the browser
          echo "[" > docs/dashboard_data.json
          FIRST=true
          for FILE in data_folder/*_health.json; do
            if [ -s "$FILE" ]; then
              if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> docs/dashboard_data.json; fi
              cat "$FILE" | jq -c '.[]' >> docs/dashboard_data.json
            fi
          done
          echo "]" >> docs/dashboard_data.json
          
          # Keep a copy in root for fallback
          cp docs/dashboard_data.json dashboard_data.json

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated Health Sync: $(date)"
            git push
          fi