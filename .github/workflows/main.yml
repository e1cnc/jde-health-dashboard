- name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 1. Force add the new data file
          git add docs/dashboard_data.json
          
          # 2. If there is a conflict, this tells Git to favor our new version
          # and clear the "unmerged files" error.
          git checkout --ours . || true
          
          # 3. Commit only if changes exist
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Automated Health Sync: $(date)"
            git push origin main
          fi