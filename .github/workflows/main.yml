name: JDE Health Sync

on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch:      # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    
    # Permissions needed to push the changes back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so rebase works correctly

      - name: Setup jq
        run: sudo apt-get install -y jq

      - name: Fetch and Merge Data
        run: |
          mkdir -p data_folder docs
          
          # 1. Define the OCI Bucket URL (Ensure this matches your PAR/Bucket URL)
          LIST_URL="https://objectstorage.us-ashburn-1.oraclecloud.com/p/2iZ2CfFNkV8LVuzg3LHTaqjseLntrFEtA991Jg9gUUDQjqjP6sSQUqyItWJh15ya/n/id7bn4roxxyb/b/JDE_Monitoring_Data/o/"
          
          echo "Fetching file list from OCI..."
          
          # 2. Get list of all files ending in _health.json
          FILES=$(curl -s "$LIST_URL" | jq -r '.objects[].name | select(contains("_health.json"))')
          
          # 3. Download each file
          for F in $FILES; do
            echo "Downloading $F..."
            curl -s "${LIST_URL}${F}" -o "data_folder/$F"
          done

          # 4. Merge all individual JSON arrays into one flat array for the dashboard
          # The 'add' operator merges multiple arrays into one.
          if [ "$(ls -A data_folder)" ]; then
            jq -s 'add' data_folder/*_health.json > docs/dashboard_data.json
            echo "Successfully merged files into docs/dashboard_data.json"
          else
            echo "No health files found to merge."
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Stage the specific data file
          git add docs/dashboard_data.json

          # CLEANUP: If there was a previous failed merge, this clears it
          git merge --abort 2>/dev/null || true
          
          # SYNC: Pull latest changes and rebase our new data on top
          git pull --rebase origin main

          # COMMIT: Only if the data actually changed
          if git diff --cached --quiet; then
            echo "No changes detected in health data. Skipping commit."
          else
            git commit -m "Automated Health Sync: $(date +'%Y-%m-%d %H:%M:%S')"
            
            # PUSH: Retry loop in case of race conditions
            for i in {1..5}; do
              git push origin main && break || (git pull --rebase origin main && sleep 5)
            done
          fi