name: JDE Health Sync & WASM Data Build

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Consolidate Data
        run: |
          mkdir -p data_folder
          mkdir -p docs
          
          # 1. Fetch object list from OCI
          LIST_URL='https://objectstorage.us-ashburn-1.oraclecloud.com/p/2iZ2CfFNkV8LVuzg3LHTaqjseLntrFEtA991Jg9gUUDQjqjP6sSQUqyItWJh15ya/n/id7bn4roxxyb/b/JDE_Monitoring_Data/o/'
          OBJECT_JSON=$(curl -f -sSL "$LIST_URL")
          
          # 2. Filter for your naming convention
          FILENAMES=$(echo "$OBJECT_JSON" | jq -r '.objects[]?.name | select(test(".*_.*_.*_.*_health\\.json$"))')
          
          if [ -z "$FILENAMES" ]; then
            echo "No matching health files found."
          else
            for FILE in $FILENAMES; do
              if [ ! -f "data_folder/${FILE}" ]; then
                  curl -sL --fail "${LIST_URL}${FILE}" -o "data_folder/${FILE}" || echo "Skipped $FILE"
              fi
            done
          fi

          # 3. Cleanup files older than 15 days
          find data_folder -name "*_health.json" -type f -mtime +15 -delete

          # 4. CONSOLIDATION & METADATA INJECTION
          # This builds a single valid JSON array from all individual files
          echo "[" > docs/dashboard_data.json
          FIRST=true
          
          for FILE in data_folder/*_health.json; do
            [ -e "$FILE" ] || continue
            
            # Extract info from filename: CUSTOMER_host_dv_datetime_health.json
            BASENAME=$(basename "$FILE")
            CUST=$(echo "$BASENAME" | cut -d'_' -f1)
            HOST=$(echo "$BASENAME" | cut -d'_' -f2)
            
            if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> docs/dashboard_data.json; fi
            
            # Inject filename data into the JSON objects so Rust can see them
            jq -c --arg cust "$CUST" --arg host "$HOST" \
              '.[] | . + {customer_name: $cust, host_name: $host}' "$FILE" >> docs/dashboard_data.json
          done
          echo "]" >> docs/dashboard_data.json
          
          # Maintain a copy in the root for redundancy
          cp docs/dashboard_data.json dashboard_data.json

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data_folder/ dashboard_data.json docs/dashboard_data.json
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Sync & Build: $(date)"
            git push
          fi