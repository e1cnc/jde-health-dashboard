name: JDE Health Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Build
        run: |
          mkdir -p data_folder
          
          # 1. Diagnostic Fetch
          # We use -v to see the headers and --trace-ascii for deep debugging
          echo "Attempting to fetch object list..."
          
          LIST_URL='https://objectstorage.us-ashburn-1.oraclecloud.com/p/2iZ2CfFNkV8LVuzg3LHTaqjseLntrFEtA991Jg9gUUDQjqjP6sSQUqyItWJh15ya/n/id7bn4roxxyb/b/JDE_Monitoring_Data/o/'
          
          # Try to get the list. If curl fails (Exit 22), we catch the error message.
          if ! curl -f -sSL "$LIST_URL" -o list.json; then
            echo "CURL Failed. Checking response with headers..."
            curl -i -L "$LIST_URL" | head -n 20
            echo "Trying alternative (wget)..."
            wget --quiet "$LIST_URL" -O list.json || { echo "Wget also failed"; exit 1; }
          fi

          # 2. Extract and Download
          FILENAMES=$(jq -r '.objects[]?.name | select(test("^[a-zA-Z0-9]+_.*_health\\.json$"))' list.json)
          
          if [ -z "$FILENAMES" ]; then
            echo "No files found matching the health pattern."
            exit 0
          fi

          for FILE in $FILENAMES; do
            echo "Downloading $FILE..."
            # Using -k (insecure) just in case there is a CA cert mismatch on the runner
            curl -f -sSL -k "${LIST_URL}${FILE}" -o "data_folder/${FILE}" || echo "Failed: $FILE"
          done

          # 3. Build consolidated dashboard_data.json
          echo "Building dashboard_data.json..."
          echo "[" > dashboard_data.json
          FIRST=true
          LATEST_FILES=$(ls data_folder/*_health.json 2>/dev/null | xargs -n 1 basename 2>/dev/null | sort -r | awk -F_ '!visited[$1$2$3]++') || true
          
          for F in $LATEST_FILES; do
            if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> dashboard_data.json; fi
            cat "data_folder/$F" | jq -c '.[]' >> dashboard_data.json
          done
          echo "]" >> dashboard_data.json

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data_folder/ dashboard_data.json
          git commit -m "Sync health data: $(date)" || echo "No changes"
          git push