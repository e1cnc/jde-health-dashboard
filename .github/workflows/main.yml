name: JDE Health Sync
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Data from OCI
        env:
          LIST_PAR: "https://objectstorage.us-ashburn-1.oraclecloud.com/p/2iZ2CfFNkV8LVuzg3LHTaqjseLntrFEtA991Jg9gUUDQjqjP6sSQUqyItWJh15ya/n/id7bn4roxxyb/b/JDE_Monitoring_Data/o/"
        run: |
          mkdir -p data_folder
          echo "Fetching object list..."
          
          # 1. Get the JSON list
          OBJECT_JSON=$(curl -s -f -X GET "$LIST_PAR")
          if [ $? -ne 0 ]; then
            echo "Error: Could not reach OCI. Check your LIST_PAR URL."
            exit 1
          fi
          
          # 2. Extract filenames
          FILENAMES=$(echo "$OBJECT_JSON" | jq -r '.objects[].name | select(endswith("_health.json"))')
          
          if [ -z "$FILENAMES" ] || [ "$FILENAMES" == "null" ]; then
            echo "No health files found in bucket."
            exit 0
          fi
          
          # 3. Download each file
          for FILE in $FILENAMES; do
            echo "Downloading $FILE..."
            curl -s -L "${LIST_PAR}${FILE}" -o "data_folder/${FILE}"
          done

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Stage the files
          git add data_folder/*.json
          
          # Check for changes before committing
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
          else
            git commit -m "Update health data: $(date)"
            git push
          fi