name: JDE Health Sync & WASM Data Build

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Consolidate Data
        run: |
          mkdir -p data_folder
          mkdir -p docs
          
          # 1. Fetch object list from OCI
          LIST_URL='https://objectstorage.us-ashburn-1.oraclecloud.com/p/2xxxx/b/JDE_Monitoring_Data/o/'
          OBJECT_JSON=$(curl -f -sSL "$LIST_URL")
          
          # 2. Filter for your specific naming convention
          FILENAMES=$(echo "$OBJECT_JSON" | jq -r '.objects[]?.name | select(test(".*_.*_.*_.*_health\\.json$"))')
          
          if [ -z "$FILENAMES" ]; then
            echo "No matching health files found."
          else
            for FILE in $FILENAMES; do
              if [ ! -f "data_folder/${FILE}" ]; then
                  curl -sL --fail "${LIST_URL}${FILE}" -o "data_folder/${FILE}" || echo "Skipped $FILE"
              fi
            done
          fi

          # 3. Cleanup files older than 15 days
          find data_folder -name "*_health.json" -type f -mtime +15 -delete

          # 4. CONSOLIDATION LOGIC (The Fix)
          # We "slurp" (-s) all files and "add" them to join the arrays correctly.
          echo "Merging JSON files..."
          if ls data_folder/*_health.json 1> /dev/null 2>&1; then
            jq -s 'add' data_folder/*_health.json > docs/dashboard_data.json
          else
            echo "[]" > docs/dashboard_data.json
          fi
          
          # Sync a copy to the root just in case
          cp docs/dashboard_data.json dashboard_data.json

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data_folder/ dashboard_data.json docs/dashboard_data.json
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Sync & Build: $(date)"
            git push
          fi