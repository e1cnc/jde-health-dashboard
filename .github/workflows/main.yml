name: JDE Health Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch and Merge Data
        run: |
          mkdir -p data_folder docs
          LIST_URL="https://objectstorage.us-ashburn-1.oraclecloud.com/p/2iZ2CfFNkV8LVuzg3LHTaqjseLntrFEtA991Jg9gUUDQjqjP6sSQUqyItWJh15ya/n/id7bn4roxxyb/b/JDE_Monitoring_Data/o/"
          
          # Fetch file list and download
          FILES=$(curl -s "$LIST_URL" | jq -r '.objects[].name | select(contains("_health.json"))')
          for F in $FILES; do
            curl -s "${LIST_URL}${F}" -o "data_folder/$F"
          done

          # Merge JSON files into a single array
          if [ "$(ls -A data_folder)" ]; then
            jq -s 'add' data_folder/*_health.json > docs/dashboard_data.json
          else
            echo "[]" > docs/dashboard_data.json
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Stage changes
          git add docs/dashboard_data.json
          
          # Use stash to safely pull latest code before committing
          git stash
          git pull --rebase origin main
          git stash pop || echo "Nothing to pop"
          
          # Re-stage and commit
          git add docs/dashboard_data.json
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Automated Health Sync: $(date)"
            git push origin main
          fi