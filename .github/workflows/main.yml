name: JDE Health Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Merge Data
        run: |
          mkdir -p data_folder docs
          
          # Use the namespace identified in your PAR URL
          LIST_URL="https://objectstorage.us-ashburn-1.oraclecloud.com/p/2iZ2CfFNkV8LVuzg3LHTaqjseLntrFEtA991Jg9gUUDQjqjP6sSQUqyItWJh15ya/n/id7bn4roxxyb/b/JDE_Monitoring_Data/o/"
          
          # 1. Download all current health files
          FILES=$(curl -s "$LIST_URL" | jq -r '.objects[].name | select(contains("_health.json"))')
          for F in $FILES; do
            curl -s "${LIST_URL}${F}" -o "data_folder/$F"
          done

          # 2. THE FIX: Merge separate files into ONE valid JSON array
          # This removes the "expected , or ]" syntax error.
          jq -s 'flatten' data_folder/*_health.json > docs/dashboard_data.json
          
          # Copy to root for easy access if needed
          cp docs/dashboard_data.json dashboard_data.json

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated Health Sync: $(date)"
            git push
          fi