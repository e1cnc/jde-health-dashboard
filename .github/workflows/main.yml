name: JDE Health Sync & WASM Data Build

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Consolidate Data
        env:
          LIST_PAR: "https://objectstorage.us-ashburn-1.oraclecloud.com/p/2xxxx/b/JDE_Monitoring_Data/o/"
        run: |
          mkdir -p data_folder
          
          # 1. Fetch object list
          echo "Fetching object list..."
          OBJECT_JSON=$(curl -s -f GET "$LIST_PAR")
          
          # 2. STRICT FILTER: Only download files matching Customer_Host_Group_TS_health.json
          # This specifically ignores targets.txt or any other non-conforming files.
          FILENAMES=$(echo "$OBJECT_JSON" | jq -r '.objects[]?.name | select(test("^[a-zA-Z0-9]+_.*_health\\.json$"))')
          
          for FILE in $FILENAMES; do
            if [ ! -f "data_folder/${FILE}" ]; then
                echo "Downloading $FILE..."
                # --fail ensures that if OCI returns an error, curl stops immediately 
                # and doesn't create a "poisoned" file with the error message.
                curl -sL --fail "${LIST_PAR}${FILE}" -o "data_folder/${FILE}" || echo "Skipped $FILE"
            fi
          done

          # 3. Cleanup files older than 15 days
          find data_folder -name "*_health.json" -type f -mtime +15 -delete

          # 4. Build consolidated dashboard_data.json
          echo "Building dashboard_data.json..."
          # Group by server components and take the latest version
          LATEST_FILES=$(ls data_folder/*_health.json | xargs -n 1 basename | sort -r | awk -F_ '!visited[$1$2$3]++')
          
          echo "[" > dashboard_data.json
          FIRST=true
          for F in $LATEST_FILES; do
            if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> dashboard_data.json; fi
            cat "data_folder/$F" | jq -c '.[]' >> dashboard_data.json
          done
          echo "]" >> dashboard_data.json

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data_folder/ dashboard_data.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Sync & Build Data: $(date)"
            git push
          fi