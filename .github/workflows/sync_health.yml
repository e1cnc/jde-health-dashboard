name: Sync Health Data

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write         # Allows the bot to push changes to your repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Data Folder
        run: mkdir -p data

      - name: Fetch and Loop Through OCI Objects
        run: |
          # 1. Download the 'targets.txt' which contains our list of files
          # We use -s to keep the logs clean and -L for redirects
          curl -s -L "${{ secrets.OCI_READ_PAR }}targets.txt" -o targets.txt
          
          # Check if targets.txt exists and has content
          if [ -s targets.txt ]; then
            echo "Found targets.txt, starting sync..."
            
            # 2. Read each line and download the corresponding file
            while IFS= read -r filename || [ -n "$filename" ]; do
              # Remove any hidden Windows carriage returns (\r)
              clean_name=$(echo "$filename" | tr -d '\r' | xargs)
              
              if [ -n "$clean_name" ]; then
                echo "Downloading: $clean_name"
                curl -s -L "${{ secrets.OCI_READ_PAR }}$clean_name" -o "data/$clean_name"
              fi
            done < targets.txt
          else
            echo "Error: targets.txt is empty or could not be downloaded from OCI."
            exit 1
          fi

      - name: Commit and Push to GitHub
        run: |
          # Setup the bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all files in the data folder
          git add data/
          
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes detected in health data. Skipping commit."
          else
            git commit -m "Auto-sync health data for all customers"
            git push origin main
          fi