name: Sync Health Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Data Folder
        run: mkdir -p data

      - name: Fetch and Loop Through OCI Objects
        run: |
          # 1. Download the targets list
          curl -s -L "${{ secrets.OCI_READ_PAR }}targets.txt" -o targets.txt
          
          # 2. Safety Check: If targets.txt contains an OCI error code, ignore it
          if grep -q "code:" targets.txt; then
            echo "Warning: targets.txt contains an OCI error. Clearing local copy."
            rm targets.txt
            touch targets.txt
          fi

          if [ -s targets.txt ]; then
            echo "Found valid targets.txt, starting sync..."
            
            while IFS= read -r filename || [ -n "$filename" ]; do
              clean_name=$(echo "$filename" | tr -d '\r' | xargs)
              
              if [ -n "$clean_name" ]; then
                echo "Downloading: $clean_name"
                # If a specific file fails, we use || true to keep the loop moving
                curl -s -L "${{ secrets.OCI_READ_PAR }}$clean_name" -o "data/$clean_name" || echo "Failed to download $clean_name"
              fi
            done < targets.txt
          else
            echo "No files listed in targets.txt or file is empty."
          fi

      - name: Commit and Push to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping commit."
          else
            git commit -m "Auto-sync JDE health data"
            git push origin main
          fi