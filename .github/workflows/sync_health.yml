name: Sync Health Data

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch:      # Allows you to click "Run workflow" manually

permissions:
  contents: write         # Explicitly grants write access to the repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Data Folder
        run: mkdir -p data

      - name: Fetch Health Files from OCI
        run: |
          # The -L follows redirects, the -o saves the output
          curl -L "${{ secrets.OCI_READ_PAR }}APRTairports.json" -o data/APRTairports.json

      - name: Commit and Push to GitHub
        run: |
          # Identify the bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the changes
          git add data/
          
          # Only commit and push if the file content actually changed
          if git diff --staged --quiet; then
            echo "No changes detected in OCI data. Skipping commit."
          else
            git commit -m "Auto-sync JDE health data from OCI"
            git push origin main
          fi