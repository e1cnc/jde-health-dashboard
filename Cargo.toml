[package]
name = "jde-health-dashboard"
version = "0.1.0"
edition = "2021"

[dependencies]
leptos = { version = "0.5", features = ["csr"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
gloo-net = "0.4"
# This feature is REQUIRED for chrono to work in a browser
chrono = { version = "0.4", features = ["wasmbind"] } 
wasm-bindgen = "0.2"