[build]
# The entry point for the application
target = "index.html"

# The output directory GitHub Pages is configured to use
dist = "docs"

# CRITICAL: This allows the WASM to load correctly from a subfolder
# Format: /repository-name/
public_url = "/jde-health-dashboard/"

[clean]
# Fixes the 'invalid type: boolean' error from previous versions
action = "clean"

[serve]
# Local dev server settings
port = 8080